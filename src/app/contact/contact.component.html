<div id="contact" class="page-section active">
  <div class="container py-5">
    <div class="text-center mb-5">
      <h2 class="fw-bold display-5" style="color: var(--secondary)">Get In Touch</h2>
      <p class="text-muted lead">We would love to hear from you or help you book a table.</p>
    </div>

    <div class="row g-5">
      <!-- Contact Info & Map Column -->
      <div class="col-lg-5">
        <div class="info-card p-4 mb-4 shadow-sm">
          <div class="d-flex align-items-start mb-4">
            <div class="icon-box me-3">
              <i class="fas fa-map-marker-alt"></i>
            </div>
            <div>
              <h5 class="fw-bold mb-1">Our Location</h5>
              <p class="text-muted mb-0">Emporis, Shop 12-13, Decathlon Rd,<br/>Near Tapovan Circle, Motera,<br/>Ahmedabad - 380005</p>
            </div>
          </div>

          <div class="d-flex align-items-start mb-4">
            <div class="icon-box me-3">
              <i class="fas fa-clock"></i>
            </div>
            <div>
              <h5 class="fw-bold mb-1">Opening Hours</h5>
              <p class="text-muted mb-0">Open 24 Hours, Everyday</p>
            </div>
          </div>

          <div class="d-flex align-items-center mt-4">
            <a href="tel:+919429739215" class="btn btn-primary-custom w-100 py-3 shadow-hover d-flex justify-content-center align-items-center">
              <i class="fas fa-phone-alt me-2"></i> Call Now
            </a>
          </div>
        </div>

        <div class="map-container shadow-sm border-0 rounded overflow-hidden">
          <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3670.3688179268593!2d72.5912444!3d23.1197931!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e83c7df4e0dbd%3A0x6bba0044fa9c9a62!2sTapovan%20Circle%2C%20Ahmedabad%2C%20Gujarat!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin" 
            width="100%" 
            height="250" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </div>

      <!-- Contact Form Column -->
      <div class="col-lg-7">
        <div class="card shadow-hover border-0 h-100">
          <div class="card-body p-4 p-md-5">
            <h3 class="mb-4 fw-bold" style="color: var(--secondary)">Send a Message</h3>
            <form id="contactForm" (submit)="handleBooking($event)">
              <div class="row g-4">
                <div class="col-md-6">
                  <label class="form-label">Full Name</label>
                  <input
                    type="text"
                    class="form-control bg-light"
                    required
                    placeholder="Your Name"
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Phone Number</label>
                  <input
                    type="tel"
                    class="form-control bg-light"
                    required
                    placeholder="Your Phone Number"
                  />
                </div>
                <div class="col-12">
                  <label class="form-label">Message</label>
                  <textarea 
                    class="form-control bg-light" 
                    rows="6" 
                    required 
                    placeholder="How can we help you? Or request a table booking here."></textarea>
                </div>
                <div class="col-12 mt-4">
                  <button
                    type="submit"
                    class="btn btn-primary-custom w-100 py-3"
                  >
                    Send Message
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
